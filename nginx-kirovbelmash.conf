# Nginx config for kirovbelmash
# Location on server: /etc/nginx/sites-available/kirovbelmash
# To apply: nginx -t && systemctl restart nginx

# Cache zone for static assets (10MB zone, 7 days inactive)
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=STATIC:10m inactive=7d use_temp_path=off;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name kirovbelmash-site.ru www.kirovbelmash-site.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name kirovbelmash-site.ru www.kirovbelmash-site.ru;

    ssl_certificate /etc/ssl/certs/selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/selfsigned.key;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # Serve static files from Next.js build directly (skip Node.js)
    # Static assets: /_next/static/ — long-term cache (1 year)
    location /_next/static/ {
        alias /var/www/kirovbelmash-next/.next/static/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Public images — cache 30 days
    location /images/ {
        alias /var/www/kirovbelmash-next/public/images/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Favicon, robots.txt etc
    location ~* \.(ico|txt|xml|webmanifest)$ {
        root /var/www/kirovbelmash-next/public;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # All other requests → Next.js (Node.js on port 3000)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
    }
}
