# Nginx config for kirovbelmash
# Location on server: /etc/nginx/sites-available/kirovbelmash
# To apply: nginx -t && systemctl restart nginx

# Cache zone for static assets (10MB zone, 7 days inactive)
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=STATIC:10m inactive=7d use_temp_path=off;

# Redirect HTTP to HTTPS (all variants → canonical non-www)
server {
    listen 80;
    server_name kirovbelmash.ru www.kirovbelmash.ru;
    return 301 https://kirovbelmash.ru$request_uri;
}

# Redirect www.kirovbelmash.ru (HTTPS) → canonical
server {
    listen 443 ssl;
    server_name www.kirovbelmash.ru;

    ssl_certificate /etc/letsencrypt/live/kirovbelmash.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kirovbelmash.ru/privkey.pem;

    return 301 https://kirovbelmash.ru$request_uri;
}


server {
    listen 443 ssl;
    server_name kirovbelmash.ru;

    ssl_certificate /etc/letsencrypt/live/kirovbelmash.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kirovbelmash.ru/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # Serve static files from Next.js build directly (skip Node.js)
    # Static assets: /_next/static/ — long-term cache (1 year)
    location /_next/static/ {
        alias /var/www/kirovbelmash-next/.next/static/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Public images — cache 30 days
    location /images/ {
        alias /var/www/kirovbelmash-next/public/images/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Favicon, robots.txt etc
    location ~* \.(ico|txt|xml|webmanifest)$ {
        root /var/www/kirovbelmash-next/public;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # =============================================
    # Редиректы со старого WordPress-сайта
    # =============================================

    # Городские дорвеи — удалены навсегда
    location /cities/ {
        return 410;
    }
    location /cities1/ {
        return 410;
    }

    # Старый каталог: линии → production-lines
    location ~ ^/catalog/liniya-(briketirovaniya|granulirovaniya)-(\d+)/?$ {
        return 301 /production-lines/liniya-$1-$2;
    }
    location ~ ^/catalog/sushilnaya-liniya-(\d+)/?$ {
        return 301 /production-lines/sushilnaya-liniya-$1;
    }

    # Старый каталог: оборудование → oborudovanie
    location ~ ^/catalog/(.+?)/?$ {
        return 301 /oborudovanie/$1;
    }
    location ~ ^/catalog/?$ {
        return 301 /oborudovanie;
    }

    # Старые проекты — точные маппинги на новые страницы
    location ~ ^/project/liniya-pelletirovaniya-briketirovaniya-dekabr-2022-hmao(/.*)?$ {
        return 301 /projects/2022-12-combined-khmao;
    }
    location ~ ^/project/liniya-briketirovaniya-pini-kay-noyabr-2016-saratov/?$ {
        return 301 /projects/2016-11-briquetting-saratov;
    }
    location ~ ^/project/liniya-briketirovaniya-pini-kay-sentyabr-2015-so/?$ {
        return 301 /projects/2015-09-briquetting-ossetia;
    }
    location ~ ^/project/liniya-sushki-sentyabr-2019-arhangelskaya/?$ {
        return 301 /projects/2019-09-drying-kotlas;
    }
    location ~ ^/project/liniya-briketirovaniya-pini-kay-avgust-2016-penza/?$ {
        return 301 /projects/2016-08-briquetting-saratov;
    }
    location ~ ^/project/liniya-briketirovaniya-pini-kay-yanvar-2016-perm/?$ {
        return 301 /projects/2016-01-briquetting-perm;
    }
    location ~ ^/project/liniya-granulirovaniya-mart-2020-komi/?$ {
        return 301 /projects/2020-03-granulation-komi;
    }
    location ~ ^/project/liniya-granulirovaniya-iyun-2018-kirov/?$ {
        return 301 /projects/2018-06-granulation-kirov;
    }
    location ~ ^/project/liniya-granulirovaniya-noyabr-2017-komi/?$ {
        return 301 /projects/2017-11-granulation-komi;
    }

    # Старые проекты без маппинга → список проектов
    location /project/ {
        return 301 /projects;
    }
    location /proekti/ {
        return 301 /projects;
    }

    # Старые комплектные линии → линии брикетирования
    location /complete-lines/ {
        return 301 /linii-briketirovaniya;
    }

    # Корневые категории со старого WP → oborudovanie/[slug]
    location = /briketirujushhee-oborudovanie {
        return 301 /oborudovanie/briketirujushhee-oborudovanie;
    }
    location = /briketirujushhee-oborudovanie/ {
        return 301 /oborudovanie/briketirujushhee-oborudovanie;
    }
    location = /oborudovanie-dlja-proizvodstva-granul {
        return 301 /oborudovanie/oborudovanie-dlja-proizvodstva-granul;
    }
    location = /oborudovanie-dlja-proizvodstva-granul/ {
        return 301 /oborudovanie/oborudovanie-dlja-proizvodstva-granul;
    }
    location = /drobilnoe-oborudovanie {
        return 301 /oborudovanie/drobilnoe-oborudovanie;
    }
    location = /drobilnoe-oborudovanie/ {
        return 301 /oborudovanie/drobilnoe-oborudovanie;
    }
    location = /bunkery-nakopiteli {
        return 301 /oborudovanie/bunkery-nakopiteli;
    }
    location = /bunkery-nakopiteli/ {
        return 301 /oborudovanie/bunkery-nakopiteli;
    }
    location = /sushilnoe-oborudovanie {
        return 301 /oborudovanie/sushilnoe-oborudovanie;
    }
    location = /sushilnoe-oborudovanie/ {
        return 301 /oborudovanie/sushilnoe-oborudovanie;
    }
    location = /pnevmotransportnoe-oborudovanie {
        return 301 /oborudovanie/pnevmotransportnoe-oborudovanie;
    }
    location = /pnevmotransportnoe-oborudovanie/ {
        return 301 /oborudovanie/pnevmotransportnoe-oborudovanie;
    }
    location = /priemnoe-oborudovanie {
        return 301 /oborudovanie/priemnoe-oborudovanie;
    }
    location = /priemnoe-oborudovanie/ {
        return 301 /oborudovanie/priemnoe-oborudovanie;
    }
    location = /transportirujushhee-oborudovanie {
        return 301 /oborudovanie/transportirujushhee-oborudovanie;
    }
    location = /transportirujushhee-oborudovanie/ {
        return 301 /oborudovanie/transportirujushhee-oborudovanie;
    }
    location = /rubitelnye-mashiny {
        return 301 /oborudovanie/rubitelnye-mashiny;
    }
    location = /rubitelnye-mashiny/ {
        return 301 /oborudovanie/rubitelnye-mashiny;
    }
    location = /sortirovochnoe-oborudovanie {
        return 301 /oborudovanie/sortirovochnoe-oborudovanie;
    }
    location = /sortirovochnoe-oborudovanie/ {
        return 301 /oborudovanie/sortirovochnoe-oborudovanie;
    }

    # Старый slug пресса ПБМ-2 → новый (slug изменён при редизайне)
    location = /oborudovanie/press-briketirujushhij-pbm-2 {
        return 301 /oborudovanie/press-pbm2-dlya-briketov;
    }
    location = /oborudovanie/press-briketirujushhij-pbm-2/ {
        return 301 /oborudovanie/press-pbm2-dlya-briketov;
    }

    # Прочие старые WordPress-страницы
    location = /o-kompanii {
        return 301 /about;
    }
    location = /o-kompanii/ {
        return 301 /about;
    }
    location = /brikety-i-pellety/ {
        return 301 /blog;
    }
    location = /thanks/ {
        return 301 /;
    }
    location = /sitemap-html/ {
        return 301 /sitemap.xml;
    }

    # WordPress-файлы и мусор — 410
    location /wp-content/ {
        return 410;
    }

    # =============================================
    # END редиректы
    # =============================================

    # All other requests → Next.js (Node.js on port 3000)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
    }
}
